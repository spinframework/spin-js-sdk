spin_manifest_version = 2

[application]
authors = ["Karthik Ganeshram <kganeshr@akamai.com>"]
description = ""
name = "chained-sourcemaps"
version = "0.1.0"

[[trigger.http]]
route = "/..."
component = "chained-sourcemaps"

[component.chained-sourcemaps]
source = "dist/chained-sourcemaps.wasm"
exclude_files = ["**/node_modules"]
allowed_outbound_hosts = [
    # "tcp://127.0.0.1:*", # Uncomment this line to while using the StarlingMonkey Debugger
]
[component.chained-sourcemaps.build]
command = ["npm install", "npm run build:debug"]
watch = ["src/**/*.ts"]