spin_manifest_version = 2

[application]
authors = ["Karthik Ganeshram <kganeshr@akamai.com>"]
description = ""
name = "aot-test"
version = "0.1.0"

[[trigger.http]]
route = "/..."
component = "aot-test"

[component.aot-test]
source = "dist/aot-test.wasm"
exclude_files = ["**/node_modules"]
allowed_outbound_hosts = [
    # "tcp://127.0.0.1:*", # Uncomment this line to while using the StarlingMonkey Debugger
]
[component.aot-test.build]
command = ["npm install", "npm run build"]
watch = ["src/**/*.ts"]