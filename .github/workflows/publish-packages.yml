name: Publish packages to npm

on:
  push:
    tags:
      - 'package/*/v*.*.*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish package from tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Parse tag for package and version
        id: parse_tag
        run: |
          echo "Ref: $GITHUB_REF"
          TAG=${GITHUB_REF#refs/tags/}
          echo "Tag: $TAG"
          PACKAGE_DIR="packages/$(echo "$TAG" | cut -d'/' -f2)"
          VERSION=$(echo "$TAG" | cut -d'/' -f3)
          VERSION_STR=${VERSION#v}
          if [[ "$VERSION_STR" =~ -(alpha|beta|rc) ]]; then
            PRERELEASE=true
          else
            PRERELEASE=false
          fi
          echo "TAG=${TAG}" >> $GITHUB_ENV
          echo "PACKAGE_DIR=${PACKAGE_DIR}" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "VERSION_STR=${VERSION_STR}" >> $GITHUB_ENV
          echo "PRERELEASE=${PRERELEASE}" >> $GITHUB_ENV

      - name: Setup Node (OIDC for npm)
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish package
        run: |
          echo "Publishing $PACKAGE_DIR version $VERSION"
          cd packages/$PACKAGE_DIR
          npm install --legacy-peer-deps
          npm run build
          VER=${VERSION#v}
          if [[ "$VER" =~ -(alpha|beta|rc) ]]; then
            NPM_TAG=prerelease
          else
            NPM_TAG=latest
          fi
          echo "Using npm tag: $NPM_TAG"
          npm publish --access public --provenance --tag "$NPM_TAG"

      - name: Create GitHub release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ env.TAG }}
          release_name: ${{ env.PACKAGE_DIR }}-${{ env.VERSION }}
          body: "Release ${{ env.VERSION }} for ${{ env.PACKAGE_DIR }} published to npm."
          draft: false
          prerelease: ${{ env.PRERELEASE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
  build_docs:
    runs-on: ubuntu-latest
    needs: publish
    steps:
        - name: Checkout Repository including Tags
          uses: actions/checkout@v6

        - name: Install Rust toolchain
          shell: bash
          run: |
            rustup toolchain install ${{ env.RUST_VERSION }} --no-self-update
            rustup default ${{ env.RUST_VERSION }}

        - name: Install Rust toolchain 
          run: rustup target add wasm32-wasip1 wasm32-unknown-unknown --toolchain ${{ env.RUST_VERSION }}

        - name: Install Node.js
          uses: actions/setup-node@v6
          with:
            node-version: ${{ env.NODE_VERSION }}   
        - name: Install npm dependencies
          run: | 
            # Install dependecies for generating docs
            npm install
            # Install dependecies for all the packages
            for d in packages/*; do
              echo "Building $d"
              cd $d
              # Legacy peer deps will allow us to ignore the unmet peer dependency warning for build-tools, which is not needed for building the packages themselves.
              npm install --legacy-peer-deps
              npm run build
              cd -
            done
        - name: Generate Spin JS SDK Docs 
          run: npm run docs
        - name: Upload Spin JS SDK Docs as Artifact
          id: docs_deployment
          uses: actions/upload-pages-artifact@v5
          with:
            path: docs/
  deploy_docs:
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.docs_deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build_docs
    steps:
      - name: Deploy to GitHub Pages
        id: docs_deployment
        uses: actions/deploy-pages@v5
